<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nova</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    
    <style>
        body { 
            font-family: system-ui, sans-serif; 
            margin: 0; 
            padding: 0; 
            background: #0a0a0a; 
            color: #ffffff; 
        }
        .chat-container { height: 100vh; display: flex; flex-direction: column; }
        
        .messages { 
            flex: 1; 
            overflow-y: auto; 
            padding: 6px; 
            scrollbar-width: none; 
        }
        
        .bubble { 
            padding: 8px 12px; 
            border-radius: 16px; 
            font-size: 14px; 
            line-height: 1.35; 
        }
        .user-bubble { 
            background: #3b82f6; 
            color: white; 
            border-bottom-right-radius: 4px; 
        }
        .bot-bubble { 
            background: #1f2937; 
            color: #ffffff; 
            border-bottom-left-radius: 4px; 
        }
        
        header { padding: 6px 10px; }
        .input-area { padding: 6px 10px; }
        
        input::placeholder {
            color: #666;
        }
    </style>
</head>
<body>
    <div class="chat-container">
        
        <!-- Header -->
        <header class="bg-gray-900 border-b border-gray-800 flex items-center justify-between text-white">
            <div class="flex items-center gap-1.5">
                <div class="w-5 h-5 bg-blue-600 rounded-xl flex items-center justify-center text-xs font-bold">N</div>
                <span class="font-medium text-sm">Nova</span>
            </div>
            <button onclick="toggleSettings()" class="p-1.5 text-gray-300 hover:text-white">
                <i class="fa-solid fa-key"></i>
            </button>
        </header>

        <!-- Messages -->
        <div id="messages" class="messages"></div>

        <!-- Input -->
        <div class="input-area bg-gray-900 border-t border-gray-800">
            <form id="chat-form" class="flex gap-2">
                <input type="text" id="user-input" 
                    class="flex-1 bg-gray-800 border border-gray-700 rounded-3xl px-4 py-2.5 text-sm text-white focus:outline-none"
                    placeholder="Ask me...">
                <button type="submit" class="w-9 h-9 bg-blue-600 rounded-3xl flex items-center justify-center text-white">
                    <i class="fa-solid fa-paper-plane"></i>
                </button>
            </form>
        </div>
    </div>

    <!-- Settings -->
    <div id="settings-modal" class="hidden fixed inset-0 bg-black/90 flex items-center justify-center z-50">
        <div class="bg-gray-900 p-5 rounded-3xl w-full max-w-xs mx-3 text-white">
            <p class="text-xs text-gray-400 mb-2">Your API Key</p>
            <input type="password" id="api-key-input" value="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"
                class="w-full bg-gray-800 border border-gray-700 rounded-2xl px-3 py-2 text-sm mb-4 text-white">
            <button onclick="saveSettings()" class="w-full bg-blue-600 py-2.5 rounded-2xl text-sm text-white">Save</button>
        </div>
    </div>

    <script>
        const messagesContainer = document.getElementById('messages');
        const apiKey = "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";

        function addMessage(text, isUser) {
            const div = document.createElement('div');
            div.className = `flex ${isUser ? 'justify-end' : 'justify-start'} mb-3`;
            
            if (isUser) {
                div.innerHTML = `<div class="max-w-[88%]"><div class="bubble user-bubble">${text}</div></div>`;
            } else {
                div.innerHTML = `
                    <div class="flex gap-1.5">
                        <div class="w-5 h-5 bg-blue-600 rounded-xl flex items-center justify-center text-[10px] font-bold mt-0.5">N</div>
                        <div class="max-w-[88%] text-sm"><div class="bubble bot-bubble">${text}</div></div>
                    </div>`;
            }
            messagesContainer.appendChild(div);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        function showTyping() {
            const typing = document.createElement('div');
            typing.id = 'typing';
            typing.className = 'flex justify-start mb-3';
            typing.innerHTML = `
                <div class="flex gap-1.5">
                    <div class="w-5 h-5 bg-blue-600 rounded-xl flex items-center justify-center text-[10px] font-bold">N</div>
                    <div class="bubble bot-bubble text-sm text-white">...</div>
                </div>`;
            messagesContainer.appendChild(typing);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
            return typing;
        }

        async function sendMessage(message) {
            const typing = showTyping();

            try {
                const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": `Bearer ${apiKey}`
                    },
                    body: JSON.stringify({
                        model: "llama-3.3-70b-versatile",
                        messages: [{ role: "user", content: message }],
                        temperature: 0.7,
                        max_tokens: 600
                    })
                });

                const data = await res.json();
                typing.remove();
                addMessage(marked.parse(data.choices[0].message.content), false);
            } catch (e) {
                typing.remove();
                addMessage(`<span class="text-red-400">Error</span>`, false);
            }
        }

        function toggleSettings() {
            document.getElementById('settings-modal').classList.toggle('hidden');
        }

        function saveSettings() {
            alert("Key Saved");
            toggleSettings();
        }

        document.getElementById('chat-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const input = document.getElementById('user-input');
            const msg = input.value.trim();
            if (!msg) return;

            addMessage(msg, true);
            input.value = '';
            sendMessage(msg);
        });

        // Welcome Message
        addMessage("Hi, I'm Nova.<br>Ask me anything!", false);
    </script>
</body>
</html>
