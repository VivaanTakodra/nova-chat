<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nova</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    
    <style>
        body { font-family: 'Inter', system_ui, sans-serif; margin: 0; padding: 0; }
        .chat-container { height: 100vh; display: flex; flex-direction: column; }
        .messages { flex: 1; overflow-y: auto; padding: 8px; }
        .bubble { padding: 10px 14px; border-radius: 18px; font-size: 15px; line-height: 1.4; }
        .user-bubble { background: rgb(59 130 246); color: white; border-bottom-right-radius: 4px; }
        .bot-bubble { background: #1f2937; border-bottom-left-radius: 4px; }
        
        /* Compact Header & Input */
        header { padding: 8px 12px; }
        .input-area { padding: 8px 12px; }
    </style>
</head>
<body class="bg-gray-950 text-gray-100">
    <div class="chat-container max-w-4xl mx-auto border-x border-gray-800">
        
        <!-- Smaller Header -->
        <header class="bg-gray-900 border-b border-gray-800 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <div class="w-7 h-7 bg-gradient-to-br from-blue-500 to-purple-600 rounded-2xl flex items-center justify-center text-lg font-bold">N</div>
                <h1 class="text-lg font-semibold">Nova</h1>
            </div>
            <button onclick="toggleSettings()" class="p-2 text-gray-400 hover:text-white">
                <i class="fa-solid fa-key text-lg"></i>
            </button>
        </header>

        <!-- Messages -->
        <div id="messages" class="messages bg-gray-950"></div>

        <!-- Compact Input -->
        <div class="input-area bg-gray-900 border-t border-gray-800">
            <form id="chat-form" class="flex gap-2">
                <input type="text" id="user-input" 
                    class="flex-1 bg-gray-800 border border-gray-700 rounded-3xl px-5 py-3 text-base focus:outline-none focus:border-blue-500"
                    placeholder="Ask anything...">
                <button type="submit" class="w-11 h-11 bg-blue-600 hover:bg-blue-500 rounded-3xl flex items-center justify-center">
                    <i class="fa-solid fa-paper-plane"></i>
                </button>
            </form>
        </div>
    </div>

    <!-- Settings Modal -->
    <div id="settings-modal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-50">
        <div class="bg-gray-900 p-6 rounded-3xl w-full max-w-xs mx-4">
            <h2 class="text-lg font-semibold mb-3">API Settings</h2>
            <input type="password" id="api-key-input" value="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"
                class="w-full bg-gray-800 border border-gray-700 rounded-2xl px-4 py-3 mb-4 text-sm">
            <button onclick="saveSettings()" class="w-full bg-blue-600 py-3 rounded-2xl text-sm font-medium">Save</button>
        </div>
    </div>

    <script>
        const messagesContainer = document.getElementById('messages');
        const apiKey = "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";

        function addMessage(text, isUser) {
            const div = document.createElement('div');
            div.className = `flex ${isUser ? 'justify-end' : 'justify-start'} mb-4`;
            
            if (isUser) {
                div.innerHTML = `<div class="max-w-[85%]"><div class="bubble user-bubble">${text}</div></div>`;
            } else {
                div.innerHTML = `
                    <div class="flex gap-2">
                        <div class="w-6 h-6 bg-gradient-to-br from-blue-500 to-purple-600 rounded-2xl flex items-center justify-center text-xs font-bold mt-0.5">N</div>
                        <div class="max-w-[85%] prose prose-invert text-sm"><div class="bubble bot-bubble">${text}</div></div>
                    </div>`;
            }
            messagesContainer.appendChild(div);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        function showTyping() {
            const typing = document.createElement('div');
            typing.id = 'typing';
            typing.className = 'flex justify-start mb-4';
            typing.innerHTML = `
                <div class="flex gap-2">
                    <div class="w-6 h-6 bg-gradient-to-br from-blue-500 to-purple-600 rounded-2xl flex items-center justify-center text-xs font-bold">N</div>
                    <div class="bubble bot-bubble text-sm">Thinking...</div>
                </div>`;
            messagesContainer.appendChild(typing);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
            return typing;
        }

        async function sendMessage(message) {
            const typing = showTyping();

            try {
                const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": `Bearer ${apiKey}`
                    },
                    body: JSON.stringify({
                        model: "llama-3.3-70b-versatile",
                        messages: [{ role: "user", content: message }],
                        temperature: 0.7,
                        max_tokens: 800
                    })
                });

                if (!res.ok) throw new Error("Failed");

                const data = await res.json();
                typing.remove();
                addMessage(marked.parse(data.choices[0].message.content), false);
            } catch (err) {
                typing.remove();
                addMessage(`<span class="text-red-400">Error. Try again.</span>`, false);
            }
        }

        function saveSettings() {
            alert("API Key Saved!");
            toggleSettings();
        }

        function toggleSettings() {
            document.getElementById('settings-modal').classList.toggle('hidden');
        }

        // Form
        document.getElementById('chat-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const input = document.getElementById('user-input');
            const msg = input.value.trim();
            if (!msg) return;

            addMessage(msg, true);
            input.value = '';
            sendMessage(msg);
        });

        // Welcome
        addMessage("Hi! I'm Nova.<br>Ask me anything!", false);
    </script>
</body>
</html>
